<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sydney Tennis Court Finder</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="bg-texture"></div>
  <header class="header">
    <div class="container">
      <p class="header__eyebrow">Your Local Court Guide</p>
      <h1 class="header__title">Sydney Tennis<br>Court Finder</h1>
      <div class="header__divider"></div>
      <p class="header__subtitle">Find and compare tennis courts across Sydney</p>
    </div>
  </header>

  <main class="container">
    <!-- Search Section -->
    <section class="search-section">
      <div class="search-bar">
        <div class="search-input-wrapper">
          <input
            type="text"
            id="suburb-input"
            class="search-input"
            placeholder="Enter suburb or postcode..."
            autocomplete="off"
          >
          <div id="autocomplete-dropdown" class="autocomplete-dropdown hidden"></div>
        </div>
        <button id="locate-btn" class="btn btn--locate" type="button">
          <svg class="icon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="3"/>
            <path d="M12 2v3M12 19v3M2 12h3M19 12h3"/>
          </svg>
          Use my location
        </button>
      </div>
      <div id="location-status" class="location-status hidden"></div>
    </section>

    <!-- Filters & Sort -->
    <section class="controls-section">
      <div class="filters">
        <div class="filter-group">
          <label class="filter-label">Court type:</label>
          <div class="filter-pills" id="court-type-filters">
            <button class="pill pill--active" data-filter="all">All</button>
            <button class="pill" data-filter="hard">Hard Court</button>
            <button class="pill" data-filter="synthetic-grass">Synthetic Grass</button>
            <button class="pill" data-filter="clay">Clay</button>
            <button class="pill" data-filter="plexicushion">Plexicushion</button>
            <button class="pill" data-filter="grass">Natural Grass</button>
          </div>
        </div>
      </div>
      <div class="sort-controls">
        <label class="filter-label">Sort by:</label>
        <select id="sort-select" class="sort-select">
          <option value="name">Name (A-Z)</option>
          <option value="distance">Distance</option>
          <option value="price-asc">Price (low to high)</option>
          <option value="price-desc">Price (high to low)</option>
          <option value="courts">Most courts</option>
        </select>
      </div>
    </section>

    <!-- Results Count -->
    <div class="results-info" aria-live="polite">
      <span id="results-count"></span>
    </div>

    <!-- Court List -->
    <section id="court-list" class="court-list"></section>
  </main>

  <footer class="footer">
    <div class="container">
      <p>Prices were last verified in March 2026. Please confirm with the venue before booking.</p>
      <p>Data is approximate. Contact venues directly for the most up-to-date information.</p>
    </div>
  </footer>

  <script src="js/data.js?v=4"></script>
  <script src="js/suburbs.js?v=4"></script>
  <script src="js/geo.js?v=4"></script>
  <script src="js/app.js?v=4"></script>
</body>
</html>
